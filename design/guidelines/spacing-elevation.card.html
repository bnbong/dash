<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Warm, soft, low — greenish ambient shadow" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:30px 24px;font-family:var(--font-sans)}
  .row{display:flex;gap:26px;align-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:88px;height:62px;background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--line)}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="t">xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t">sm · card</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t">md · hover</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t">lg</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-pop)"></div><span class="t">pop · modal</span></div>
</div>
</body></html>
