<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Paper & Ink" subtitle="Warm canvas, green-black ink" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:92px;border-radius:var(--radius-sm);padding:9px;border:1px solid var(--line)}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em}
  .hex{font-family:var(--font-mono);font-size:9.5px;opacity:.75;margin-top:1px}
  .lt{color:var(--ink-900)} .dk{color:#EFF5F0}
</style></head>
<body>
<div class="row">
  <div class="sw lt" style="background:var(--paper-50)"><span class="name">canvas</span><span class="hex">#FAF7F1</span></div>
  <div class="sw lt" style="background:var(--paper-100)"><span class="name">sunken</span><span class="hex">#F3EFE6</span></div>
  <div class="sw lt" style="background:var(--paper-200)"><span class="name">line</span><span class="hex">#E9E3D6</span></div>
  <div class="sw lt" style="background:var(--ink-300)"><span class="name">ink-300</span><span class="hex">#A8ADA2</span></div>
  <div class="sw dk" style="background:var(--ink-500)"><span class="name">muted</span><span class="hex">#6B7268</span></div>
  <div class="sw dk" style="background:var(--ink-700)"><span class="name">body</span><span class="hex">#3D453B</span></div>
  <div class="sw dk" style="background:var(--ink-900)"><span class="name">strong</span><span class="hex">#1E2620</span></div>
</div>
</body></html>
