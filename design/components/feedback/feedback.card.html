<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--canvas); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .scrim { position: relative; height: 230px; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--line); background: var(--surface-sunken); }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Dialog, Toast, EmptyState, Button, Card } = window.DashDesignSystem_ae03e4;
const Ic = ({ n }) => <i data-lucide={n}></i>;

function Demo() {
  return (
    <div className="grid">
      <div className="stack">
        <span className="lbl">Dialog</span>
        <div className="scrim">
          <Dialog open title="실명으로 발급할까요?" description="인증서에 실명이 표시됩니다. 언제든 닉네임으로 되돌릴 수 있어요."
            primaryAction={<Button>발급</Button>}
            secondaryAction={<Button variant="ghost">취소</Button>} />
        </div>
      </div>
      <div className="stack">
        <span className="lbl">Toast</span>
        <Toast tone="seed" icon={<Ic n="sprout" />}>Dash Grove에 Impact Seed 1개가 더해졌어요</Toast>
        <Toast tone="positive" icon={<Ic n="check" />}>오늘의 기록을 저장했어요</Toast>
        <span className="lbl" style={{ marginTop: 8 }}>Empty state</span>
        <Card padding="none">
          <EmptyState icon={<Ic n="feather" />} title="아직 오늘의 기록이 없어요"
            description="밥을 해 먹고, 방을 치운 것도 삶을 운영한 행동이에요."
            action={<Button variant="accent" iconLeft={<Ic n="pen-line" />}>한 줄 기록하기</Button>} />
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
