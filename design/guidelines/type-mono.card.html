<!-- @dsCard group="Type" viewport="700x200" name="Mono — Data voice" subtitle="IBM Plex Mono · metrics, labels, timestamps" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:24px;font-family:var(--font-sans);color:var(--text-body)}
  .stack{display:flex;flex-direction:column;gap:16px}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)}
  .nums{display:flex;gap:28px;align-items:baseline}
  .n{font-family:var(--font-mono);font-feature-settings:'tnum' 1;font-weight:500;letter-spacing:-.01em;color:var(--text-strong)}
  .lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);display:block;margin-bottom:4px}
</style></head>
<body>
<div class="stack">
  <div class="eyebrow">Impact Seed Ledger — 2026.07</div>
  <div class="nums">
    <div><span class="lab">This month</span><span class="n" style="font-size:38px">18</span></div>
    <div><span class="lab">Trees</span><span class="n" style="font-size:38px">3</span></div>
    <div><span class="lab">Community</span><span class="n" style="font-size:38px">84,200</span></div>
    <div><span class="lab">Convert</span><span class="n" style="font-size:38px">74%</span></div>
  </div>
  <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">0123456789 · 7월 3일 09:42 · Seed +1 · pending → converted → verified</div>
</div>
</body></html>
