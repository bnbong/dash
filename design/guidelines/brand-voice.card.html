<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:24px;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .col{display:flex;flex-direction:column;gap:9px}
  .head{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;font-family:var(--font-mono);letter-spacing:.06em;text-transform:uppercase}
  .line{padding:11px 13px;border-radius:var(--radius-sm);font-size:13.5px;line-height:1.5}
  .yes{background:var(--positive-100);color:var(--pine-900)}
  .no{background:var(--surface-sunken);color:var(--text-muted);text-decoration:line-through;text-decoration-color:var(--ink-300)}
  .ic{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
</style></head>
<body>
<div class="grid">
  <div class="col">
    <div class="head" style="color:var(--positive-600)"><span class="ic" style="background:var(--positive-600)">✓</span> 이렇게 말합니다</div>
    <div class="line yes">오늘은 큰 성취보다 생활 기반을 지킨 날입니다.</div>
    <div class="line yes">이번 주의 운영이 Grove에 Seed 3개를 더했어요.</div>
    <div class="line yes">공간을 다시 통제하기 시작한 날입니다.</div>
  </div>
  <div class="col">
    <div class="head" style="color:var(--caution-600)"><span class="ic" style="background:var(--caution-600)">×</span> 이렇게 말하지 않습니다</div>
    <div class="line no">스트릭이 끊겼습니다. 다시 시작하세요.</div>
    <div class="line no">목표를 실패해서 나무를 심지 못했어요.</div>
    <div class="line no">친구보다 나무를 적게 심었습니다.</div>
  </div>
</div>
</body></html>
