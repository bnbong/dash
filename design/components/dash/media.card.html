<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--canvas); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 18px; max-width: 460px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 18px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 14px; display: block; }
  .row { display: flex; gap: 16px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { VoicePlayer, PhotoViewer } = window.DashDesignSystem_ae03e4;
function Demo() {
  return (
    <div className="stack">
      <div className="card">
        <span className="lbl">VoicePlayer · 음성 재생</span>
        <VoicePlayer seed="산책 음성 메모" duration={22} transcript="산책하면서 남긴 메모 — 오늘은 좀 지쳤지만 걷고 나니 나아졌다." />
      </div>
      <div className="card">
        <span className="lbl">PhotoViewer · 탭하면 전체보기</span>
        <div className="row">
          <PhotoViewer caption="정돈된 책상과 노트북 — 정리된 작업 공간" domainColor="var(--domain-space)" domainLabel="Space" detected={['책상','노트북','실내','정돈']} />
          <PhotoViewer caption="직접 만든 한 끼 — 새 레시피" domainColor="var(--domain-hobby)" domainLabel="Hobby" detected={['음식','접시','요리']} />
          <span style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.5 }}>썸네일을 탭하면 캡션과 "Dash가 감지한 것"이 함께 열립니다.</span>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
