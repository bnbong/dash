<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:20px;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .d{display:flex;align-items:center;gap:9px;padding:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm)}
  .sw{width:26px;height:26px;border-radius:7px;flex-shrink:0}
  .en{font-size:12.5px;font-weight:600;color:var(--text-strong);line-height:1.1}
  .ko{font-size:10px;color:var(--text-faint)}
</style></head>
<body>
<div class="grid">
  <div class="d"><span class="sw" style="background:var(--domain-body)"></span><div><div class="en">Body</div><div class="ko">몸</div></div></div>
  <div class="d"><span class="sw" style="background:var(--domain-space)"></span><div><div class="en">Space</div><div class="ko">공간</div></div></div>
  <div class="d"><span class="sw" style="background:var(--domain-relation)"></span><div><div class="en">Relation</div><div class="ko">관계</div></div></div>
  <div class="d"><span class="sw" style="background:var(--domain-work)"></span><div><div class="en">Work</div><div class="ko">일과 학습</div></div></div>
  <div class="d"><span class="sw" style="background:var(--domain-hobby)"></span><div><div class="en">Hobby</div><div class="ko">취미와 창작</div></div></div>
  <div class="d"><span class="sw" style="background:var(--domain-mind)"></span><div><div class="en">Mind</div><div class="ko">마음</div></div></div>
  <div class="d"><span class="sw" style="background:var(--domain-admin)"></span><div><div class="en">Life Admin</div><div class="ko">생활 행정</div></div></div>
  <div class="d"><span class="sw" style="background:var(--domain-impact)"></span><div><div class="en">Impact</div><div class="ko">임팩트</div></div></div>
</div>
</body></html>
