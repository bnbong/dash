<!-- @startingPoint section="App" subtitle="Full Dash mobile app — 5 interactive screens" viewport="402x800" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dash — App</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--paper-100); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .phone { width: 402px; height: 800px; background: var(--canvas); border-radius: 40px; border: 1px solid var(--line-strong); box-shadow: var(--shadow-pop); overflow: hidden; display: flex; flex-direction: column; position: relative; }
  .statusbar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
  .statusbar .time { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--text-strong); }
  .statusbar .icons { display: flex; gap: 6px; color: var(--text-strong); }
  .scroll { flex: 1; overflow-y: auto; padding: 4px 18px 24px; }
  .scroll::-webkit-scrollbar { width: 0; }
  .toastwrap { position: absolute; left: 0; right: 0; bottom: 84px; display: flex; justify-content: center; pointer-events: none; z-index: 50; }
</style>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#1F4D3D"/>
    <rect x="30" y="62" width="26" height="7" rx="3.5" fill="#C97F33"/>
    <rect x="40" y="46" width="26" height="7" rx="3.5" fill="#79AD93"/>
    <rect x="50" y="30" width="26" height="7" rx="3.5" fill="#ECF4EF"/>
  </svg>
</template>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="TodayScreen.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="EvidenceScreen.jsx"></script>
<script type="text/babel" src="GroveScreen.jsx"></script>
<script type="text/babel" src="ReportScreen.jsx"></script>
<script type="text/babel" src="ProfileScreen.jsx"></script>
<script type="text/babel">
const D = window.DashDesignSystem_ae03e4;
const { TabBar, Toast } = D;

function App() {
  const [tab, setTab] = React.useState('today');
  const [seedTotal, setSeedTotal] = React.useState(18);
  const [lastEntry, setLastEntry] = React.useState(true);
  const [evidenceFilter, setEvidenceFilter] = React.useState('all');
  const [toast, setToast] = React.useState(null);
  const scrollRef = React.useRef(null);

  // Re-render Lucide glyphs after every paint.
  React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const go = (t, opts) => {
    setTab(t);
    if (t === 'evidence') setEvidenceFilter(opts && opts.filter ? opts.filter : 'all');
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };

  const onRecord = () => {
    setSeedTotal((s) => s + 1);
    setLastEntry(true);
    setToast('Dash Grove에 Impact Seed 1개가 더해졌어요');
    setTimeout(() => setToast(null), 2600);
  };

  const screens = {
    today: <window.TodayScreen seedTotal={seedTotal} lastEntry={lastEntry} onRecord={onRecord} go={go} />,
    dash: <window.DashboardScreen go={go} />,
    evidence: <window.EvidenceScreen filter={evidenceFilter} setFilter={setEvidenceFilter} />,
    grove: <window.GroveScreen seedTotal={seedTotal} />,
    report: <window.ReportScreen />,
    profile: <window.ProfileScreen seedTotal={seedTotal} go={go} />,
  };

  const items = [
    { key: 'today', label: 'Today', icon: <window.Icon name="pen-line" size={22} /> },
    { key: 'dash', label: 'Dashboard', icon: <window.Icon name="layout-grid" size={22} /> },
    { key: 'evidence', label: 'Evidence', icon: <window.Icon name="scroll-text" size={22} /> },
    { key: 'grove', label: 'Grove', icon: <window.Icon name="trees" size={22} /> },
    { key: 'report', label: 'Report', icon: <window.Icon name="line-chart" size={22} /> },
  ];

  return (
    <div className="phone">
      <div className="statusbar">
        <span className="time">9:41</span>
        <span className="icons">
          <window.Icon name="signal" size={16} /><window.Icon name="wifi" size={16} /><window.Icon name="battery-full" size={16} />
        </span>
      </div>
      <div className="scroll" ref={scrollRef}>{screens[tab]}</div>
      {toast && <div className="toastwrap"><Toast tone="seed" icon={<window.Icon name="sprout" size={18} />}>{toast}</Toast></div>}
      <TabBar active={tab} onChange={go} items={items} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
