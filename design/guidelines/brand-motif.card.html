<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pine-900);padding:30px;font-family:var(--font-sans);display:flex;align-items:center;gap:40px}
  .marks{display:flex;align-items:flex-end;gap:18px}
  .grp{display:flex;flex-direction:column-reverse;gap:8px}
  .d{height:8px;border-radius:4px}
  .copy{max-width:300px}
  .h{color:#EFF5F0;font-size:17px;font-weight:600;margin-bottom:6px}
  .p{color:var(--pine-200);font-size:13px;line-height:1.55}
</style></head>
<body>
<div class="marks">
  <div class="grp">
    <div class="d" style="width:34px;background:var(--ochre-500)"></div>
    <div class="d" style="width:34px;margin-left:14px;background:var(--pine-400)"></div>
    <div class="d" style="width:34px;margin-left:28px;background:#EFF5F0"></div>
  </div>
</div>
<div class="copy">
  <div class="h">세 개의 상승하는 대시</div>
  <div class="p">달리기(dash)이자 대시보드(dashboard), 그리고 점진적 성장. 오커에서 시작해 파인으로 올라가는 궤적이 Dash의 핵심 표식입니다.</div>
</div>
</body></html>
