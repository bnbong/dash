<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:26px;font-family:var(--font-sans);display:flex;align-items:center;gap:40px}
  .item{display:flex;flex-direction:column;align-items:center;gap:12px}
  .t{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint)}
  .dark{background:var(--pine-900);padding:18px 26px;border-radius:var(--radius-md)}
</style></head>
<body>
<div class="item"><img src="../assets/logo-wordmark.svg" height="40"><span class="t">Wordmark</span></div>
<div class="item"><img src="../assets/logo-mark.svg" height="44"><span class="t">Mark</span></div>
<div class="item"><img src="../assets/logo-app-icon.svg" height="64"><span class="t">App icon</span></div>
<div class="item"><div class="dark"><img src="../assets/logo-mark.svg" height="36" style="filter:brightness(0) invert(1)"></div><span class="t">On dark</span></div>
</body></html>
