<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--brand-tint);padding:28px;font-family:var(--font-sans)}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pine-600);margin-bottom:12px}
  .voice{font-family:var(--font-sans);font-weight:420;font-size:20px;line-height:1.66;letter-spacing:-.01em;color:var(--pine-900);max-width:600px}
</style></head>
<body>
<div class="eyebrow">오늘의 해석</div>
<p class="voice">오늘은 목표 달성보다 생활 기반을 유지한 날입니다. 식사, 공간 정리, 내일 준비, 관계 응답이 기록되었습니다. 큰 성취는 아니지만, 내일의 마찰을 줄인 운영 행동입니다.</p>
</body></html>
