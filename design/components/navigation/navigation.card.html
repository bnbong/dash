<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--canvas); padding: 28px; }
  .phone { max-width: 380px; margin: 0 auto; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .pad { padding: 12px 16px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; display:block; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { AppHeader, SectionTabs, TabBar, IconButton, Avatar } = window.DashDesignSystem_ae03e4;
const Ic = ({ n }) => <i data-lucide={n}></i>;

function Demo() {
  const [tab, setTab] = React.useState('today');
  const [sec, setSec] = React.useState('mine');
  const items = [
    { key:'today', label:'Today', icon:<Ic n="pen-line" /> },
    { key:'dash', label:'Dashboard', icon:<Ic n="layout-grid" /> },
    { key:'evidence', label:'Evidence', icon:<Ic n="scroll-text" /> },
    { key:'grove', label:'Grove', icon:<Ic n="trees" /> },
    { key:'report', label:'Report', icon:<Ic n="line-chart" /> },
  ];
  return (
    <div className="phone">
      <div className="pad" style={{ paddingBottom: 0 }}>
        <AppHeader large eyebrow="6월 30일 화요일" title="오늘"
          trailing={<><IconButton icon={<Ic n="bell" />} label="알림" /><Avatar name="Jiwon" size="sm" /></>} />
      </div>
      <div className="pad">
        <SectionTabs active={sec} onChange={setSec} items={[{key:'mine',label:'My Grove'},{key:'community',label:'Community Grove'}]} />
      </div>
      <TabBar active={tab} onChange={setTab} items={items} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
