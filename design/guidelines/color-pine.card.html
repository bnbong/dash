<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Pine" subtitle="Evergreen primary · the Grove" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:92px;border-radius:var(--radius-sm);padding:9px;border:1px solid rgba(0,0,0,.04)}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em}
  .hex{font-family:var(--font-mono);font-size:9.5px;opacity:.8;margin-top:1px}
  .lt{color:var(--pine-900)} .dk{color:#EFF5F0}
</style></head>
<body>
<div class="row">
  <div class="sw dk" style="background:var(--pine-900)"><span class="name">900</span><span class="hex">#14342A</span></div>
  <div class="sw dk" style="background:var(--pine-700)"><span class="name">700 ·brand</span><span class="hex">#1F4D3D</span></div>
  <div class="sw dk" style="background:var(--pine-500)"><span class="name">500</span><span class="hex">#2E6B53</span></div>
  <div class="sw dk" style="background:var(--pine-400)"><span class="name">400</span><span class="hex">#4E8A6F</span></div>
  <div class="sw lt" style="background:var(--pine-300)"><span class="name">300</span><span class="hex">#79AD93</span></div>
  <div class="sw lt" style="background:var(--pine-100)"><span class="name">100</span><span class="hex">#D7E8DE</span></div>
  <div class="sw lt" style="background:var(--pine-50)"><span class="name">50</span><span class="hex">#ECF4EF</span></div>
</div>
</body></html>
