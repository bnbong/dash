<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Ochre" subtitle="Warm momentum · the dash" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:92px;border-radius:var(--radius-sm);padding:9px;border:1px solid rgba(0,0,0,.04)}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em}
  .hex{font-family:var(--font-mono);font-size:9.5px;opacity:.8;margin-top:1px}
  .lt{color:#3a2410} .dk{color:#fff}
</style></head>
<body>
<div class="row">
  <div class="sw dk" style="background:var(--ochre-700)"><span class="name">700</span><span class="hex">#9C551E</span></div>
  <div class="sw dk" style="background:var(--ochre-600)"><span class="name">600</span><span class="hex">#B96A26</span></div>
  <div class="sw dk" style="background:var(--ochre-500)"><span class="name">500 ·accent</span><span class="hex">#C97F33</span></div>
  <div class="sw lt" style="background:var(--ochre-400)"><span class="name">400</span><span class="hex">#DD9A4F</span></div>
  <div class="sw lt" style="background:var(--ochre-300)"><span class="name">300</span><span class="hex">#EAB778</span></div>
  <div class="sw lt" style="background:var(--ochre-100)"><span class="name">100</span><span class="hex">#F9E8D2</span></div>
  <div class="sw lt" style="background:var(--ochre-50)"><span class="name">50</span><span class="hex">#FCF4E8</span></div>
</div>
</body></html>
