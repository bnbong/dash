<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);padding:24px;font-family:var(--font-sans)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:7px}
  .bar{background:var(--pine-300);border-radius:3px;width:22px}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .v{font-family:var(--font-mono);font-size:9px;color:var(--text-faint)}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="height:4px"></div><span class="t">1</span><span class="v">4</span></div>
  <div class="col"><div class="bar" style="height:8px"></div><span class="t">2</span><span class="v">8</span></div>
  <div class="col"><div class="bar" style="height:12px"></div><span class="t">3</span><span class="v">12</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="t">4</span><span class="v">16</span></div>
  <div class="col"><div class="bar" style="height:20px"></div><span class="t">5</span><span class="v">20</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span class="t">6</span><span class="v">24</span></div>
  <div class="col"><div class="bar" style="height:32px"></div><span class="t">7</span><span class="v">32</span></div>
  <div class="col"><div class="bar" style="height:40px"></div><span class="t">8</span><span class="v">40</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span class="t">9</span><span class="v">48</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span class="t">10</span><span class="v">64</span></div>
</div>
</body></html>
