name: Deploy to GitHub Pages

on:
  # main 브랜치에 푸시될 때마다 배포
  push:
    branches: [main]
  # Actions 탭에서 수동 실행 허용
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번의 배포만 진행 (중간 실행은 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # Pages가 비활성 상태면 자동으로 활성화 (Source = GitHub Actions)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare site
        run: |
          mkdir -p _site
          # 허브 페이지 + 디자인 시스템 전체 (랜딩·온보딩·앱·덱 UI 킷 포함)
          cp index.html _site/index.html
          cp -R design _site/design
          # 셀프컨테인드 단일 파일 데모
          cp demo.html _site/demo.html
          # Jekyll 처리를 건너뛰도록 .nojekyll 추가
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
